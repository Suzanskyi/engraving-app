version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: suzengrave-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: suzengrave
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: suzengrave123
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d suzengrave"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local